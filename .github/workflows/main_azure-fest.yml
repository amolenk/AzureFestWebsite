name: Build and deploy Node.js app to Azure Web App - azurefest

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Ensure pnpm uses hoisted linker *in deploy only*
      - name: Create .npmrc for hoisted node_modules
        run: |
          cat > src-react/.npmrc <<'EOF'
          node-linker=hoisted
          EOF

      - name: Install and build
        run: |
          cd src-react
          pnpm install --frozen-lockfile
          pnpm build

      # Create a clean deploy folder with only what the app needs at runtime
      - name: Create deploy bundle
        run: |
          mkdir -p deploy
          cp -aL src-react/.next/standalone/. deploy/
          cp -a  src-react/.next/static/. deploy/.next/static/
          mkdir -p deploy/public
          cp -a  src-react/public/. deploy/public/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F441CE36511349E485B0725215DF9D86 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D64FC48499924635BDFEE2DF606850B0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_73DF1C5D78E34C84934D6F01EEBA2194 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'azure-fest'
          slot-name: 'Production'
          package: .
